# M7 / ADR 0015a D1 — Variant A conductor kustomization. Layers the conductor
# CronJob + manual Job on top of the base (namespace, PVC, host-gpu Service +
# Endpoints, Secret template). Overlays (kind-local, prod) reference THIS dir.
#
# Validation (HOST/CI-deferred — no kustomize/kubectl in this env):
#   kustomize build deploy/k8s/conductor
#   kubectl apply -k deploy/k8s/conductor --dry-run=client
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: shorts
resources:
  - ../base
  - cronjob.yaml
  - job.yaml
