# M7 / ADR 0015a — base kustomization. The shared, environment-independent
# resources for the k8s profile. Overlays (kind-local, prod) layer on top and
# patch the PATCH TARGETs (PVC accessModes/storageClass, host-gpu Endpoints,
# image tag, nodeSelector).
#
# Validation (HOST/CI-deferred — no kustomize/kubectl in this env):
#   kustomize build deploy/k8s/base
#   kubectl apply -k deploy/k8s/base --dry-run=client
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: shorts
resources:
  - namespace.yaml
  - pvc.yaml
  - host-gpu.yaml
  - secrets.template.yaml
