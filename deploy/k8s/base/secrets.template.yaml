# M7 / ADR 0015a D5 — Secret TEMPLATE. THIS FILE HOLDS NO REAL VALUES.
#
# The publish stages need platform OAuth credentials + API keys, which on the
# host live in a vault env-file. In the cluster they are surfaced as a single
# Secret named `shorts-secrets`, consumed by the conductor pod via
# `envFrom.secretRef` (see deploy/k8s/conductor/cronjob.yaml).
#
# The real values are NEVER committed. Two ways the cluster gets them:
#   1. `make k8s-secrets` (the canonical path, D5): injects the host vault
#      env-file into a `shorts-secrets` Secret —
#        kubectl create secret generic shorts-secrets -n shorts \
#          --from-env-file=$VAULT --dry-run=client -o yaml | kubectl apply -f -
#      This OVERWRITES the placeholder Secret applied from this template.
#   2. This template (applied by kustomize) so the namespace always has a
#      `shorts-secrets` object — preventing the conductor pod from failing to
#      start on a missing secretRef — but with CHANGEME placeholders that must
#      be replaced by (1) before any real publish.
#
# The env NAMES below mirror what the host publish adapters read. They are the
# stable contract; values are filled from the vault. Keep this list in sync
# with the vault env-file keys.
apiVersion: v1
kind: Secret
metadata:
  name: shorts-secrets
  labels:
    app.kubernetes.io/part-of: shorts-creator
type: Opaque
stringData:
  # --- YouTube Data API / OAuth (videos.insert, scope youtube.upload) ---
  YOUTUBE_CLIENT_ID: "CHANGEME"
  YOUTUBE_CLIENT_SECRET: "CHANGEME"
  YOUTUBE_REFRESH_TOKEN: "CHANGEME"
  # --- TikTok Content Posting API (24h access token, refresh token) ---
  TIKTOK_CLIENT_KEY: "CHANGEME"
  TIKTOK_CLIENT_SECRET: "CHANGEME"
  TIKTOK_REFRESH_TOKEN: "CHANGEME"
  # --- data-API budget keys (preflight data_api_budget_gate) ---
  ALPHA_VANTAGE_API_KEY: "CHANGEME"
