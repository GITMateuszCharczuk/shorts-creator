# profiles/finance/profile.yaml
# The finance channel's standing identity (ADR 0005 D9 / 0010 D5 / 0017).
# Authored ONCE; 00b writes every script FROM this — per-video production is fully unattended.
# Persona archetype: rigorous evidence-skeptic ("follow the data, not the crowd").

schema_version: "1.0.0"
niche: finance

persona:
  # the voice 00b writes IN, and the direction the voice A/B (ADR 0017 D1) is judged against
  voice: >
    A calm, precise, lightly-dry evidence-skeptic — explains like a sharp friend who actually
    reads the filings. Distrusts hype and doom equally; never breathless, never preachy. Earns
    trust by showing the number and its source, not by raising its voice.
  pov: >
    Long-term, costs-and-incentives first, evidence over vibes. Educational and third-person —
    explains how money mechanics work; never tells the viewer what to buy or sell (YMYL).

  # positions the channel ARGUES FROM — gives the original-insight gate (ADR 0014/0016) something
  # specific to be non-obvious WITH. Each is arguable, finance-true, and not investment advice.
  stances:
    - "Fees and time compound louder than any stock pick."
    - "If a return sounds exciting, it's usually risk you haven't priced yet."
    - "Follow the incentive: ask who profits from the advice before you take it."
    - "Diversification is the only free lunch; everything else has a bill."
    - "The boring index usually beats the clever strategy once costs are counted."
    - "A headline is a feeling; a filing is a fact — we read the filing."

  catchphrase: "Follow the cash flow, not the crowd."

  # recurring series build habitual return viewership (ADR 0017 D5; M4 rotation schedules these)
  series:
    - id: "close_30s"
      title: "The 30-Second Close"
      cadence: "daily"
      lane: "reach"
      format: "news_reaction"
      premise: "What actually moved the market today and the one number that explains it."
    - id: "myth_monday"
      title: "Myth Monday"
      cadence: "weekly"
      lane: "monetization"
      format: "myth_buster"
      premise: "One widely-repeated money belief, checked against the data."
    - id: "the_receipt"
      title: "The Receipt"
      cadence: "weekly"
      lane: "reach"
      format: "surprising_stat"
      premise: "One counterintuitive, fully-sourced finance stat — and what it means for you."

brand_kit:
  # deliberately NOT gold/red 'hype' colours — deep ink-green + a cool cyan accent reads
  # trustworthy and calm, the opposite of the scam-ad palette (supports the ADR 0017 D2 identity).
  palette: ["#0C1E12", "#0E2A1C", "#00E5FF", "#F4F7F5"]   # ink, deep-green, cyan accent, off-white
  font: "Inter"                                            # neutral, legible at mobile sizes
  logo: "brand/finance/logo.svg"
  # mascot: a cheap, ownable proxy for the missing face (ADR 0017 D6) — a calm character with a
  # ledger + glasses; appears in the brand bug and the end-card, never narrates.
  mascot: "brand/finance/ledger-owl.svg"   # "Ledger", a minimalist spectacled owl holding a clipboard

defaults:
  # the M3 voice-A/B winner (ADR 0017 D1) is written here; kokoro is the provisional default until
  # the gate runs (judged on expressiveness + hook delivery; hosted voice is the recorded escalation).
  voice_backend: "kokoro"

  music_index: "profiles/finance/music/index.json"   # curated strike-safe library (populated at M3)
  emphasis_hex: "00E5FF"                              # the cyan accent, for caption emphasis words

  # YMYL guardrail the script must carry (05b enforces; the persona reinforces educational framing)
  disclaimer: "Educational only — not financial advice."

  # the hard never-say list (05b rejects a script that trips any of these — a disclaimer is not a
  # licence to give advice). This is what keeps the evidence-skeptic credible AND platform-safe.
  # prohibited_claims is the human-readable policy; denylist_terms is its machine-readable companion
  # — the literal phrases 05b's profile-driven check matches (ADR 0010 D5: safety policy is data).
  prohibited_claims:
    - "buy / sell / hold recommendations on a specific security"
    - "price targets or 'this will hit $X' predictions"
    - "guaranteed, risk-free, or 'can't lose' returns"
    - "get-rich / double-your-money / passive-income framing"
    - "second-person advice ('you should buy/sell ...')"
    - "tax, legal, or personalised financial advice"
  denylist_terms: ["guaranteed", "risk-free", "can't lose", "price target", "you should buy",
                   "you should sell", "double your money", "get rich", "hot tip"]

  # ADR 0006 D7: in-voice opener archetypes 00b picks from — keeps hooks on-brand without a human
  # writing tone per video. The hook states a tension; the body resolves it with the number.
  hook_styles:
    - "myth-flip:    'Everyone says X. The data says the opposite.'"
    - "receipt:      'Here's the number nobody quotes — and what it costs you.'"
    - "follow-money: 'Ask who profits from this advice. The answer explains everything.'"
    - "boring-wins:  'The unglamorous option quietly beat the clever one again. Here's why.'"

  # ADR 0006 D8 / 0017 D5: rotatable closing follow-CTA phrases (FOMO, on-brand for the skeptic)
  end_card_phrases:
    - "Follow — we read the filings so you don't have to."
    - "Follow for the number behind tomorrow's headline."
    - "Follow the cash flow, not the crowd."

  # ADR 0017 D2: visual-identity bias for 01a stock search — prefer abstract/textural, deny the
  # scam-ad clichés; data-viz is preferred over stock wherever a number exists.
  stock_style: "abstract"
  stock_denylist:
    - "coins falling"
    - "stacks of cash"
    - "bull and bear statue"
    - "city skyline at dusk"
    - "businessman pointing at chart"
    - "rocket to the moon"

  # candidate primary-keyword themes 00b threads (caption/on-screen/spoken — ADR 0006 D7);
  # the live topic per video comes from 00a's fresh data, not this list.
  keyword_themes: ["inflation", "interest rates", "index funds", "compounding", "fees",
                   "401(k)", "ETFs", "the Fed", "savings", "diversification"]

  # where 00a looks for the day's fresh, sourceable angle (free/credible, no key required).
  # The cited number must trace to one of these or a primary filing — never an anonymous blog.
  topic_sources:
    - "https://www.federalreserve.gov/feeds/press_all.xml"   # Fed press releases
    - "https://www.bls.gov/feed/news_release/cpi.rss"        # CPI / inflation prints
    - "https://www.sec.gov/cgi-bin/browse-edgar?action=getcompany&type=&output=atom"  # EDGAR filings
    - "https://home.treasury.gov/system/files/226/RSS-feed.xml"   # Treasury
