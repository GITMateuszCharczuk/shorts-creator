      args:
      - 00a
      - --batch
      - '{{workflow.parameters.batch_id}}'
      - --video
      - '{{workflow.parameters.video_id}}'
      command:
      - python
      - -m
      - shorts.stage
      env:
      - name: DATA_ROOT
        value: /data
      image: shorts-creator:ci
      volumeMounts:
      - mountPath: /data
        name: data
    name: 00a
    retryStrategy:
      backoff:
        duration: 30s
        factor: 2
      limit: 2
